name: Write Flake

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  write-flake:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: wimpysworld/nothing-but-nix@687c797a730352432950c707ab493fcc951818d7 # v10

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.head_ref || github.ref }}
          token: ${{ secrets.PAT || github.token }}

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # v22

      - name: Setup Nix cache
        uses: cachix/cachix-action@5f2d7c5294214f71b873db4b969586b980625e71 # v17
        with:
          name: oscarmarshall
          authToken: "${{ github.event_name != 'pull_request' && secrets.CACHIX_AUTH_TOKEN || '' }}"

      - name: Run write-flake
        run: |
          nix run .#write-flake

      - name: Commit and push changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add -A
          if ! git diff --staged --quiet; then
            git commit -m "Write Flake: Auto-update flake.nix"
            git push
          else
            echo "No changes to commit"
          fi
