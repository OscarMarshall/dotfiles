name: Write Flake

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  write-flake:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: wimpysworld/nothing-but-nix@687c797a730352432950c707ab493fcc951818d7 # v10

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ github.head_ref || github.ref }}
          token: ${{ secrets.PAT }}

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # v22

      - name: Setup Nix cache
        uses: cachix/cachix-action@1eb2ef646ac0255473d23a5907ad7b04ce94065c # v17
        with:
          name: oscarmarshall
          authToken: "${{ github.event_name != 'pull_request' && secrets.CACHIX_AUTH_TOKEN || '' }}"

      - name: Run write-flake
        run: |
          nix run .#write-flake

          if ! git diff --quiet; then
            nix flake update
            iterations=0
            while true; do
              flake_before=$(cat flake.nix)
              nix run .#write-flake
              [ "$(cat flake.nix)" = "$flake_before" ] && break
              iterations=$((iterations + 1))
              [ "$iterations" -ge 10 ] && echo "write-flake did not converge" >&2 && exit 1
            done
          fi

      - name: Commit and push changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add -A
          if ! git diff --staged --quiet; then
            git commit -m "Write Flake: Auto-update flake.nix"
            git push
          else
            echo "No changes to commit"
          fi
