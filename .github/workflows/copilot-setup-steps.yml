name: "Copilot Setup Steps"

# Automatically run the setup steps when they are changed to allow for easy validation, and
# allow manual testing through the repository's "Actions" tab
on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/copilot-setup-steps.yml
  pull_request:
    paths:
      - .github/workflows/copilot-setup-steps.yml

jobs:
  # The job MUST be called `copilot-setup-steps` or it will not be picked up by Copilot.
  copilot-setup-steps:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Ensure Git trusts the runner CA bundle
        run: |
          ca_bundle="${RUNNER_TEMP}/copilot-ca-bundle.crt"
          cat /etc/ssl/certs/ca-certificates.crt > "${ca_bundle}"
          if [ -n "${NODE_EXTRA_CA_CERTS}" ] && [ -f "${NODE_EXTRA_CA_CERTS}" ]; then
            cat "${NODE_EXTRA_CA_CERTS}" >> "${ca_bundle}"
          fi

          git config --global http.sslCAInfo "${ca_bundle}"
          echo "GIT_SSL_CAINFO=${ca_bundle}" >> "$GITHUB_ENV"
          echo "NIX_SSL_CERT_FILE=${ca_bundle}" >> "$GITHUB_ENV"
          echo "SSL_CERT_FILE=${ca_bundle}" >> "$GITHUB_ENV"
          echo "CURL_CA_BUNDLE=${ca_bundle}" >> "$GITHUB_ENV"

      - uses: wimpysworld/nothing-but-nix@687c797a730352432950c707ab493fcc951818d7 # v10

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ github.head_ref || github.ref }}

      - name: Install Nix
        uses: cachix/install-nix-action@8aa03977d8d733052d78f4e008a241fd1dbf36b3 # v31.10.6

      - name: Setup Nix cache
        uses: cachix/cachix-action@5f2d7c5294214f71b873db4b969586b980625e71 # v17
        with:
          name: oscarmarshall
          extraPullNames: nix-community
