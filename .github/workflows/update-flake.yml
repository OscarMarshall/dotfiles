name: Update Flake

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  update-flake:
    runs-on: ubuntu-latest
    # Skip if commit message contains "Update flake:" to avoid infinite loops
    # Also skip if it's a fork PR (no write access)
    if: |
      (
        (github.event_name == 'push' && !contains(github.event.head_commit.message, 'Update flake:')) ||
        (github.event_name == 'pull_request' && !contains(github.event.pull_request.head.commit.message, 'Update flake:') && github.event.pull_request.head.repo.full_name == github.repository)
      )
    permissions:
      contents: write
    steps:
      - uses: wimpysworld/nothing-but-nix@main

      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6
        with:
          ref: ${{ github.head_ref || github.ref }}
          token: ${{ secrets.PAT }}

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@c5a866b6ab867e88becbed4467b93592bce69f8a # v21

      - name: Setup Nix cache
        uses: DeterminateSystems/magic-nix-cache-action@565684385bcd71bad329742eefe8d12f2e765b39 # v13

      - name: Run write-flake until fixed point
        run: |
          # Run write-flake in a loop until no changes are detected
          max_iterations=10
          iteration=0
          
          while [ $iteration -lt $max_iterations ]; do
            echo "Iteration $((iteration + 1))/$max_iterations"
            
            # Run write-flake
            nix run .#write-flake
            
            # Check if there are any changes
            if git diff --quiet && git diff --cached --quiet; then
              echo "No changes detected, fixed point reached"
              break
            fi
            
            # Stage all changes to check in next iteration
            git add flake.nix flake.lock
            
            iteration=$((iteration + 1))
          done
          
          if [ $iteration -eq $max_iterations ]; then
            echo "Error: Reached maximum iterations without convergence"
            exit 1
          fi

      - name: Commit and push changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          
          # Check if there are staged changes
          if ! git diff --staged --quiet; then
            git commit -m "Update flake: Auto-update flake.nix and flake.lock"
            git push
          else
            echo "No changes to commit"
          fi
