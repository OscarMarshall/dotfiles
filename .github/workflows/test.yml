name: Test

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-linux:
    name: Build Linux hosts
    runs-on: ubuntu-latest
    steps:
      - uses: wimpysworld/nothing-but-nix@687c797a730352432950c707ab493fcc951818d7 # v10

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.head_ref || github.ref }}

      - name: Install Nix
        uses: cachix/install-nix-action@8aa03977d8d733052d78f4e008a241fd1dbf36b3 # v31.10.6
        with:
          extra_nix_config: |
            accept-flake-config = true

      - name: Setup Nix cache
        uses: cachix/cachix-action@5f2d7c5294214f71b873db4b969586b980625e71 # v17
        with:
          name: oscarmarshall
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
          extraPullNames: nix-community

      - run: nix flake metadata

      - run: |
          cat <<-EOF > modules/ci-runtime.nix
          {
            _module.args.CI = true;
          }
          EOF

      - name: Build harmony
        run: nix build .#nixosConfigurations.harmony.config.system.build.toplevel

      - name: Build melaan
        run: nix build .#nixosConfigurations.melaan.config.system.build.toplevel

      - name: Build omarshal@dev203.meraki.com
        run: nix build '.#homeConfigurations."omarshal@dev203.meraki.com".activationPackage'

  build-darwin:
    name: Build Darwin hosts
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.head_ref || github.ref }}

      - name: Install Nix
        uses: cachix/install-nix-action@8aa03977d8d733052d78f4e008a241fd1dbf36b3 # v31.10.6
        with:
          extra_nix_config: |
            accept-flake-config = true

      - name: Setup Nix cache
        uses: cachix/cachix-action@5f2d7c5294214f71b873db4b969586b980625e71 # v17
        with:
          name: oscarmarshall
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
          extraPullNames: nix-community
          # cachix 1.11.1 crashes when it traverses unreadable symlinks inside
          # nix-doom-emacs-unstraightened store paths. Pin to nixpkgs commit
          # acde43339d72 (Nov 2025, cachix 1.9.1) which handles such errors
          # gracefully instead of crashing.
          installCommand:
            nix-env --quiet -j8 -iA cachix -f
            https://github.com/NixOS/nixpkgs/archive/acde43339d727890337fe174b16a9bd0027e96fc.tar.gz

      - run: nix flake metadata

      - run: |
          cat <<-EOF > modules/ci-runtime.nix
          {
            _module.args.CI = true;
          }
          EOF

      - name: Build OMARSHAL-M-2FD2
        run: nix build .#darwinConfigurations.OMARSHAL-M-2FD2.config.system.build.toplevel
