name: Test

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-linux:
    name: Build Linux hosts
    runs-on: ubuntu-latest
    steps:
      - uses: wimpysworld/nothing-but-nix@687c797a730352432950c707ab493fcc951818d7 # v10

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.head_ref || github.ref }}

      - name: Install Nix
        uses: cachix/install-nix-action@8aa03977d8d733052d78f4e008a241fd1dbf36b3 # v31.10.6
        with:
          extra_nix_config: |
            substituters = https://cache.nixos.org/ https://attic.xuyh0120.win/lantian
            trusted-public-keys = cache.nixos.org-1:6NCHdD59X431o0gWypbMrAURkbJ16ZPMQFGspcDShjY= lantian:EeAUQ+W+6r7EtwnmYjeVwx5kOGEBpjlBfPlzGlTNvHc=

      - name: Setup Nix cache
        uses: cachix/cachix-action@5f2d7c5294214f71b873db4b969586b980625e71 # v17
        with:
          name: oscarmarshall
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
          extraPullNames: nix-community

      - run: nix flake metadata

      - name: Check flake nixConfig substituters
        run: |
          metadata_file="$(mktemp)"
          nix flake metadata --json > "$metadata_file"
          python - "$metadata_file" <<'PY'
          import json
          import sys

          metadata_path = sys.argv[1]
          with open(metadata_path, encoding="utf-8") as metadata_file:
              metadata = json.load(metadata_file)
          nix_config = metadata["nixConfig"]

          expected_substituters = {
              "https://nix-community.cachix.org",
              "https://oscarmarshall.cachix.org",
          }
          expected_keys = {
              "nix-community.cachix.org-1:mB9FSh9qf2dCimDSUo8Zy7bkq5CX+/rkCWyvRCYg3Fs=",
              "oscarmarshall.cachix.org-1:Fa13vGeBXoJ7jWpvnalg/PCRTtvCpyuHUFL5jQXt/9w=",
          }

          actual_substituters = set(nix_config["extra-substituters"])
          actual_keys = set(nix_config["extra-trusted-public-keys"])

          assert actual_substituters == expected_substituters, actual_substituters
          assert actual_keys == expected_keys, actual_keys
          PY

      - run: |
          cat <<-EOF > modules/ci-runtime.nix
          {
            _module.args.CI = true;
          }
          EOF

      - name: Build harmony
        run: nix build .#nixosConfigurations.harmony.config.system.build.toplevel

      - name: Build melaan
        run: nix build .#nixosConfigurations.melaan.config.system.build.toplevel

      - name: Build omarshal@dev203.meraki.com
        run: nix build '.#homeConfigurations."omarshal@dev203.meraki.com".activationPackage'

  build-darwin:
    name: Build Darwin hosts
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.head_ref || github.ref }}

      - name: Install Nix
        uses: cachix/install-nix-action@8aa03977d8d733052d78f4e008a241fd1dbf36b3 # v31.10.6
        with:
          extra_nix_config: |
            substituters = https://cache.nixos.org/ https://attic.xuyh0120.win/lantian
            trusted-public-keys = cache.nixos.org-1:6NCHdD59X431o0gWypbMrAURkbJ16ZPMQFGspcDShjY= lantian:EeAUQ+W+6r7EtwnmYjeVwx5kOGEBpjlBfPlzGlTNvHc=

      - name: Setup Nix cache
        uses: cachix/cachix-action@5f2d7c5294214f71b873db4b969586b980625e71 # v17
        with:
          name: oscarmarshall
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
          extraPullNames: nix-community

      - run: nix flake metadata

      - run: |
          cat <<-EOF > modules/ci-runtime.nix
          {
            _module.args.CI = true;
          }
          EOF

      - name: Build OMARSHAL-M-2FD2
        run: nix build .#darwinConfigurations.OMARSHAL-M-2FD2.config.system.build.toplevel
