name: Test

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-linux:
    name: Build Linux hosts
    runs-on: ubuntu-latest
    steps:
      - uses: wimpysworld/nothing-but-nix@687c797a730352432950c707ab493fcc951818d7 # v10

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ github.head_ref || github.ref }}

      - name: Quick Install Lix
        uses: canidae-solutions/lix-quick-install-action@v4.0.1
        with:
          lix_conf: |
            substituters = https://cache.nixos.org/ https://attic.xuyh0120.win/lantian
            trusted-public-keys = cache.nixos.org-1:6NCHdD59X431o0gWypbMrAURkbJ16ZPMQFGspcDShjY= lantian:EeAUQ+W+6r7EtwnmYjeVwx5kOGEBpjlBfPlzGlTNvHc=

      - name: Setup Nix cache
        uses: cachix/cachix-action@3ba601ff5bbb07c7220846facfa2cd81eeee15a1 # v16
        with:
          name: oscarmarshall
          authToken: "${{ github.event_name != 'pull_request' && secrets.CACHIX_AUTH_TOKEN || '' }}"
          extraPullNames: nix-community

      - run: nix flake metadata

      - run: |
          cat <<-EOF > modules/ci-runtime.nix
          {
            _module.args.CI = true;
          }
          EOF

      - name: Build harmony
        run: nix build .#nixosConfigurations.harmony.config.system.build.toplevel

      - name: Build melaan
        run: nix build .#nixosConfigurations.melaan.config.system.build.toplevel

  build-darwin:
    name: Build Darwin hosts
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ github.head_ref || github.ref }}

      - name: Quick Install Lix
        uses: canidae-solutions/lix-quick-install-action@v4.0.1
        with:
          lix_conf: |
            substituters = https://cache.nixos.org/ https://attic.xuyh0120.win/lantian
            trusted-public-keys = cache.nixos.org-1:6NCHdD59X431o0gWypbMrAURkbJ16ZPMQFGspcDShjY= lantian:EeAUQ+W+6r7EtwnmYjeVwx5kOGEBpjlBfPlzGlTNvHc=

      - name: Setup Nix cache
        uses: cachix/cachix-action@3ba601ff5bbb07c7220846facfa2cd81eeee15a1 # v16
        with:
          name: oscarmarshall
          authToken: "${{ github.event_name != 'pull_request' && secrets.CACHIX_AUTH_TOKEN || '' }}"
          extraPullNames: nix-community

      - run: nix flake metadata

      - run: |
          cat <<-EOF > modules/ci-runtime.nix
          {
            _module.args.CI = true;
          }
          EOF

      - name: Build OMARSHAL-M-2FD2
        run: nix build .#darwinConfigurations.OMARSHAL-M-2FD2.config.system.build.toplevel
